# Local-first hackathon stack
# 啟動: docker compose up -d
# 停止: docker compose down
# 重置: docker compose down -v  (砍 volume 資料全清)

services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-sass-2-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: demo_sass_2
      POSTGRES_USER: owner
      POSTGRES_PASSWORD: owner_pass
      # 啟用 plpgsql + 必要 extension
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owner -d demo_sass_2"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
    name: demo-sass-2-pg-data
