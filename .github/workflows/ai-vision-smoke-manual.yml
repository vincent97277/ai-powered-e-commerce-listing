name: AI vision smoke (manual)

# V2.6.x Tier 1 #7 — promote tests/smoke/ai-vision-local.smoke.ts to a
# workflow_dispatch GitHub Action so the operator can run the end-to-end
# AI vision smoke from the GH UI (or `gh workflow run`) without needing
# Docker postgres + dev server + Inngest CLI on their local machine.
#
# What this proves end-to-end (same assertions as the local script):
#   1. Dev server boots after lib upgrades (zod 4 / ai v6 / etc.)
#   2. Merchant login still works
#   3. Photo upload reaches /api/uploads, returns 200 + key
#   4. /api/products/generate enqueues to Inngest, polling resolves to success
#   5. AI metadata is REAL (title not in fixture-fallback set)
#   6. ai_usage_events row written with non-zero token counts (load-bearing —
#      catches silent zeroing from token-shape rename across SDK majors)
#   7. Test product cleanly deletes
#
# Cost: ~$0.02 per run (one GPT-4o vision call). Manual trigger only — never
# on push/PR. Requires repo secret `OPENAI_API_KEY_SMOKE` (real key, not the
# fake `sk-ci-*` placeholder used in ci.yml).
#
# Why workflow_dispatch and not scheduled: the V2.6.2 retro showed the local
# script catches regressions roughly once per SDK-major bump, not weekly.
# Scheduled runs would burn $0.02 × 7 days × 52 = ~$7/yr to find bugs that
# only exist after operator-initiated dependency upgrades. Manual trigger
# matches the actual failure cadence.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to test (default: main)'
        required: false
        default: 'main'

permissions:
  contents: read

jobs:
  ai-vision-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_owner
          POSTGRES_PASSWORD: ci_owner_pass
          POSTGRES_DB: demo_sass_2_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_owner -d demo_sass_2_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Mirror ci.yml so RLS roles + role split are exercised the same way.
      DATABASE_URL: postgres://ci_owner:ci_owner_pass@localhost:5432/demo_sass_2_ci
      DATABASE_URL_USER: postgres://web_anon:ci_anon_pw@localhost:5432/demo_sass_2_ci
      DATABASE_URL_ADMIN: postgres://web_admin:ci_admin_pw@localhost:5432/demo_sass_2_ci
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ADMIN_PASSWORD: ci-admin
      ADMIN_SESSION_SECRET: ci-admin-session-secret-32-chars-min-padding-here
      MERCHANT_SESSION_SECRET: ci-merchant-session-secret-32-chars-min-padding-here
      DEMO_MERCHANT_AKAMI_ID: 11111111-1111-1111-1111-111111111111
      DEMO_MERCHANT_AFEN_ID: 22222222-2222-2222-2222-222222222222
      STORAGE_BACKEND: local
      # Real key from GH secret — the smoke MUST hit OpenAI; fake key would
      # land on the worker fixture-fallback path which the test asserts against.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_SMOKE }}
      # Inngest dev CLI doesn't validate these — placeholder is fine.
      INNGEST_EVENT_KEY: ci-fake-event-key
      INNGEST_SIGNING_KEY: ci-fake-signing-key

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Verify OPENAI_API_KEY_SMOKE secret is configured
        # Fail fast with a clear message instead of letting Playwright timeout
        # 90 seconds deep into a fake-key OpenAI 401.
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY_SMOKE }}" ]; then
            echo "::error::OPENAI_API_KEY_SMOKE secret is not configured."
            echo "Add it via Settings → Secrets and variables → Actions → New repository secret."
            echo "Use a real OpenAI API key (sk-...). Cost per smoke run: ~\$0.02."
            exit 1
          fi
          echo "OPENAI_API_KEY_SMOKE is set (${#OPENAI_API_KEY} chars)"

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install psql + Playwright Chromium
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          pnpm exec playwright install --with-deps chromium

      - name: Bootstrap RLS roles in CI postgres
        env:
          PGPASSWORD: ci_owner_pass
        run: |
          psql -h localhost -U ci_owner -d demo_sass_2_ci \
            --set ON_ERROR_STOP=on \
            -v "web_anon_password=ci_anon_pw" \
            -v "web_admin_password=ci_admin_pw" \
            -f db/init/prod-roles.template.sql

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Seed demo merchant rows (akami + afen)
        # Verbatim from LOCAL_SETUP.md step 4 — these IDs match
        # DEMO_MERCHANT_AKAMI_ID / DEMO_MERCHANT_AFEN_ID env vars and the
        # smoke test logs in as akami. ON CONFLICT DO NOTHING is idempotent.
        # approved_at must be set or storefronts show 「暫停營業中」 and
        # the merchant flow rejects the upload.
        env:
          PGPASSWORD: ci_owner_pass
        run: |
          psql -h localhost -U ci_owner -d demo_sass_2_ci \
            --set ON_ERROR_STOP=on <<'EOF'
          INSERT INTO merchants (id, slug, name, brand_voice, theme_vars, approved_at, approved_by_admin) VALUES
            ('11111111-1111-1111-1111-111111111111',
             'akami',
             '阿明選物',
             '日式侘寂選物，質感溫潤，文字偏內斂。',
             '{"--brand-primary":"#8B7355","--brand-bg":"#FAF8F5","--brand-text":"#2C2416","--brand-radius":"2px","--brand-font-heading":"Noto Serif TC,serif"}'::jsonb,
             NOW(), 'system'),
            ('22222222-2222-2222-2222-222222222222',
             'afen',
             '阿芬鹹酥雞',
             '夜市熱賣親切庶民，文字活潑，敢用台語。',
             '{"--brand-primary":"#E63946","--brand-bg":"#FFF8E7","--brand-text":"#1D3557","--brand-radius":"12px","--brand-font-heading":"Noto Sans TC,sans-serif"}'::jsonb,
             NOW(), 'system')
          ON CONFLICT (id) DO NOTHING;
          EOF

      - name: Seed merchants auth (dev mode — shared password "demo1234")
        # The smoke test logs in as akami@demo.local with password demo1234.
        # `dev` mode uses a single deterministic password across all merchants
        # so the test fixture matches what the seed produced.
        run: pnpm tsx scripts/seed-merchant-auth.ts --mode=dev

      - name: Start dev server (background)
        # Same pattern as ci.yml — pnpm dev (NOT pnpm start) keeps env.ts
        # validation lenient so plain-TCP localhost postgres works.
        run: |
          pnpm dev > /tmp/server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:3000/; then
              echo "Server ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start. Logs:"
          cat /tmp/server.log
          exit 1

      - name: Start Inngest dev CLI (background)
        # The smoke flow enqueues to /api/inngest and polls /api/products/generate
        # for status. Inngest dev CLI on :8288 is the worker that picks up the
        # event and runs product-ingest.ts (sharp + vision + DB write).
        run: |
          npx -y inngest-cli@latest dev -u http://localhost:3000/api/inngest > /tmp/inngest.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sf -o /dev/null http://localhost:8288/; then
              echo "Inngest dev CLI ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Inngest dev CLI failed to start. Logs:"
          cat /tmp/inngest.log
          exit 1

      - name: Run AI vision smoke
        # `pnpm test:smoke:ai-local` runs preflight first (one clear "fix
        # this" message if a prereq is missing), then playwright. Preflight
        # checks dev server + inngest + env + akami in DB + fixture image.
        run: pnpm test:smoke:ai-local

      - name: Server logs (on failure)
        if: failure()
        run: |
          echo "--- Dev server logs ---"
          cat /tmp/server.log || true
          echo "--- Inngest dev CLI logs ---"
          cat /tmp/inngest.log || true

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace
          path: |
            test-results/
            playwright-report/
          retention-days: 7
